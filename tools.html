<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wiki Multi-Toolbox (Editor Update)</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-c.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>

    <style>
        :root {
            --bg-color: #1a1a1a; --card-bg: #2d2d2d; --text-color: #e0e0e0; 
            --accent-color: #4a90e2; --border-color: #444; 
            --input-bg: #111; --input-text: #b5e8b0; --success-color: #2ecc71;
        }

        body { 
            background: radial-gradient(circle at center, #262626 0%, var(--bg-color) 100%) !important;
            color: var(--text-color); font-family: 'Pretendard', sans-serif;
            margin: 0; padding: 20px; line-height: 1.6;
        }

        .container { max-width: 900px; margin: 0 auto; }

        .tool-section {
            background: var(--card-bg); border-radius: 12px; padding: 20px;
            margin-bottom: 25px; border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h2 { margin-top: 0; font-size: 18px; color: var(--accent-color); display: flex; align-items: center; gap: 8px; }

        /* 에디터 스타일 */
        .editor-wrapper { position: relative; border-radius: 8px; overflow: hidden; border: 1px solid var(--border-color); background: #2d2d2d; }
        
        #code-input {
            width: 100%; height: 300px; background: transparent; color: transparent;
            caret-color: white; border: none; padding: 15px; font-family: 'Fira Code', monospace;
            font-size: 14px; position: absolute; top: 0; left: 0; z-index: 1; outline: none;
            resize: none; white-space: pre; overflow: auto;
        }

        #highlight-area {
            width: 100%; height: 300px; margin: 0; padding: 15px;
            box-sizing: border-box; font-size: 14px; pointer-events: none;
            white-space: pre; overflow: hidden;
        }

        /* 에디터 우측 상단 버튼 그룹 */
        .editor-actions {
            position: absolute; top: 10px; right: 15px; z-index: 10;
            display: flex; flex-direction: column; gap: 8px;
        }

        .icon-btn {
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2);
            color: white; padding: 6px; border-radius: 4px; cursor: pointer; font-size: 12px;
            display: flex; align-items: center; justify-content: center; transition: 0.2s;
        }

        .icon-btn:hover { background: var(--accent-color); }

        /* 공통 UI 요소 */
        .counter-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; margin-top: 15px; }
        .stat-card { background: rgba(0,0,0,0.2); padding: 12px; border-radius: 10px; border: 1px solid var(--border-color); text-align:center; }
        .stat-label { font-size: 11px; opacity: 0.6; }
        .stat-value { font-size: 16px; font-weight: bold; color: var(--input-text); }

        textarea.simple { width: 100%; background: var(--input-bg); color: var(--input-text); border: 1px solid var(--border-color); border-radius: 8px; padding: 10px; box-sizing: border-box; }
        select { background: var(--input-bg); color: white; border: 1px solid var(--border-color); padding: 5px; border-radius: 4px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="tool-section">
        <h2>💻 Code Editor (VS Style)</h2>
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <select id="lang-select" onchange="updateHighlight()">
                <option value="markup">HTML</option>
                <option value="python">Python</option>
                <option value="javascript">JavaScript</option>
                <option value="cpp">C++</option>
                <option value="c">C</option>
            </select>
            <span style="font-size: 11px; opacity: 0.5;">기본 확장자: .html</span>
        </div>
        
        <div class="editor-wrapper">
            <div class="editor-actions">
                <button class="icon-btn" onclick="copyCode()" title="코드 복사">📋 복사</button>
                <button class="icon-btn" onclick="downloadCode()" title="파일 다운로드">💾 저장</button>
            </div>
            <textarea id="code-input" oninput="updateHighlight()" onscroll="syncScroll()" spellcheck="false" placeholder="코드를 여기에 작성하세요..."></textarea>
            <pre id="highlight-area" aria-hidden="true"><code id="highlight-code" class="language-markup"></code></pre>
        </div>
    </div>

    <div class="tool-section">
        <h2>📝 텍스트 분석기</h2>
        <textarea id="count-input" class="simple" rows="5" placeholder="분석할 내용을 입력하세요..." oninput="countText()"></textarea>
        <div id="counter-res" class="counter-grid">
            <div class="stat-card"><div class="stat-label">공백 포함</div><div class="stat-value" id="c1">0자</div></div>
            <div class="stat-card"><div class="stat-label">공백 제외</div><div class="stat-value" id="c2">0자</div></div>
            <div class="stat-card"><div class="stat-label">단어 수</div><div class="stat-value" id="c3">0개</div></div>
            <div class="stat-card"><div class="stat-label">단락 수</div><div class="stat-value" id="c4">0개</div></div>
            <div class="stat-card"><div class="stat-label">문장 수</div><div class="stat-value" id="c5">0개</div></div>
        </div>
    </div>

    <div class="tool-section">
        <h2>📊 Excel to MD</h2>
        <input type="file" id="xl-input" accept=".xlsx, .xls">
        <div id="xl-res"></div>
    </div>
</div>

<script>
    // --- 코드 에디터 로직 ---
    function updateHighlight() {
        const code = document.getElementById('code-input').value;
        const lang = document.getElementById('lang-select').value;
        const target = document.getElementById('highlight-code');
        
        target.className = 'language-' + lang;
        target.textContent = code + (code.endsWith('\n') ? ' ' : '');
        Prism.highlightElement(target);
    }

    function syncScroll() {
        const input = document.getElementById('code-input');
        const area = document.getElementById('highlight-area');
        area.scrollTop = input.scrollTop;
        area.scrollLeft = input.scrollLeft;
    }

    function copyCode() {
        const code = document.getElementById('code-input').value;
        navigator.clipboard.writeText(code).then(() => {
            alert('클립보드에 복사되었습니다!');
        });
    }

    function downloadCode() {
        const code = document.getElementById('code-input').value;
        const lang = document.getElementById('lang-select').value;
        const extensions = { markup: 'html', python: 'py', javascript: 'js', cpp: 'cpp', c: 'c' };
        const ext = extensions[lang] || 'txt';
        
        const blob = new Blob([code], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `script_${new Date().getTime()}.${ext}`;
        a.click();
        URL.revokeObjectURL(url);
    }

    // --- 텍스트 분석 로직 ---
    function countText() {
        const text = document.getElementById('count-input').value;
        if (!text) return;
        document.getElementById('c1').innerText = text.length + "자";
        document.getElementById('c2').innerText = text.replace(/\s/g, '').length + "자";
        document.getElementById('c3').innerText = (text.trim() ? text.trim().split(/\s+/).length : 0) + "개";
        document.getElementById('c4').innerText = text.split(/\n+/).filter(p => p.trim()).length + "개";
        document.getElementById('c5').innerText = text.split(/[.!?]+/).filter(s => s.trim()).length + "개";
    }

    // --- 엑셀 로직 (기존 유지) ---
    document.getElementById('xl-input').onchange = function(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const firstSheet = workbook.SheetNames[0];
            const json = XLSX.utils.sheet_to_json(workbook.Sheets[firstSheet], {header: 1});
            if(json.length > 0) {
                let md = "| " + json[0].join(" | ") + " |\n| " + json[0].map(()=>"---").join(" | ") + " |\n" +
                         json.slice(1).map(row => "| " + row.join(" | ") + " |").join("\n");
                document.getElementById('xl-res').innerHTML = `<textarea class="simple" rows="5" readonly>${md}</textarea>`;
            }
        };
        reader.readAsArrayBuffer(file);
    };
</script>

</body>
</html>
