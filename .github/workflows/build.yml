name: 티들리위키 빌드

on:
  push:
    paths:
      - 'docs/**'
      - 'docs2/**'
      - 'docs3/**'
      - 'docs4/**'
      - 'docs5/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 빌드 실행
        run: python build.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html index2.html index3.html index4.html index5.html docs/ docs2/ docs3/ docs4/ docs5/ backup/
          git diff --staged --quiet || git commit -m "auto: md → 티들리위키 빌드"
          git push
